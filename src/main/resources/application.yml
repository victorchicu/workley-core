server:
  ssl:
    enabled: false
  port: 8443
  error:
    include-message: always
  reactive:
    session:
      timeout: 30d
      cookie:
        name: SESSION
        secure: false
        max-age: 30d
        http-only: true
        same-site: lax
  forward-headers-strategy: framework
spring:
  ai:
    chat:
      observations:
        log-prompt: false
        log-completion: false
        include-error-logging: true
    ollama:
      chat:
        options:
          top-p: 0.9
          model: llama3.2:latest
          max-tokens: 16384
          temperature: 0.8
      base-url: http://localhost:7869
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY}
      chat:
        options:
          model: gpt-5.4-mini # https://developers.openai.com/api/docs/pricing
          max-tokens: 16384
          temperature: 0.2
          stream-usage: true
      embedding:
        options:
          model: text-embedding-3-small
          dimensions: 1536 #or 3072 for text-embedding-3-large
  r2dbc:
    url: ${SPRING_R2DBC_URL}
    username: ${SPRING_R2DBC_USERNAME}
    password: ${SPRING_R2DBC_PASSWORD}
  flyway:
    url: ${SPRING_DATASOURCE_URL}
    user: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    locations: classpath:/db/migration
  rsocket:
    server:
      transport: websocket
      mapping-path: /rsocket
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder}
            scope: openid, email, profile
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  application:
    name: workley-core
  scheduling:
    enabled: true
storage:
  s3:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:workley-attachments}
    region: us-east-1
attachment:
  max-file-size: 10485760
  allowed-mime-types: application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document
  orphan-ttl-minutes: 30
  extracted-text-max-length: 50000
gateway:
  frontend:
    base-url: ${GATEWAY_FRONTEND_BASE_URL}
  otp:
    expiry: 5m
    max-attempts: 5
  security:
    anonymous:
      jwt:
        secret: ${GATEWAY_SECURITY_ANONYMOUS_JWT_SECRET}
    auth:
      jwt:
        secret: ${GATEWAY_SECURITY_AUTH_JWT_SECRET}
      cookie:
        prefix: __HOST-
  sendgrid:
    api-key: ${SENDGRID_API_KEY}
    from-email: noreply@roselweiss.com
    from-name: Workley Assistant
management:
  health:
    rabbit:
      enabled: false
    ratelimiters:
      enabled: true
    circuitbreakers:
      enabled: true
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health, metrics
  metrics:
    tags:
      application: workley-core
resilience4j:
  timelimiter:
    configs:
      gpt-ai-model:
        timeout-duration: 300s
        cancel-running-future: false
      ollama-ai-model:
        timeout-duration: 300s
        cancel-running-future: false
  circuitbreaker:
    configs:
      gpt-ai-model:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      ollama-ai-model:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
